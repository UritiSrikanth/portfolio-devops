trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '006b5a95-c72f-40a9-ad14-14a99554fb41'
  imageRepository: 'uritisrikanthportfoliodevops'
  containerRegistry: 'myportfolio.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and Push Stage
  jobs:
  - job: BuildAndPush
    displayName: Build and Push Docker Image
    pool:
      name: 'PersonalAgentMachine'
      demands:
      - Agent.Name -equals MyPortfolio

    steps:
    - checkout: self

    - script: |
        echo "Agent Name: $(Agent.Name)"
        echo "Build Sources Directory: $(Build.SourcesDirectory)"
        docker --version
    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - task: Docker@2
      displayName: Build and Push Image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
    - task: AzureWebAppContainer@1
      inputs:
        azureSubscription: 'PortfolioMapping'
        appName: 'PersonalPortfolio'
        containers: 'myportfolio.azurecr.io/uritisrikanthportfoliodevops:latest'